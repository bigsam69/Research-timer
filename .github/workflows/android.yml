name: Android CI/CD

on:
  push:
    branches: [ "main", "master", "developer" ]
    tags:
      - "v*" # Triggers when you push tags like v1.0, v2.1.3, etc.
  pull_request:
    branches: [ "main", "master", "developer" ]
  workflow_dispatch:

env:
  ACTIONS_AUDIT_NODE_VERSION: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    # Grant permissions to write files to the Release section
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Regenerate Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper

    - name: Create Mock Files (Keystore & Google Services)
      run: |
        keytool -genkeypair -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" \
          -storepass android \
          -keypass android

        echo '{"project_info":{"project_number":"123","project_id":"mock-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.example"}},"api_key":[{"current_key":"mock_key"}],"services":{"app_invite_service":{"status":1}}}]}' > app/google-services.json

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Prepare APK for Release
      run: cp app/build/outputs/apk/debug/app-debug.apk "Research timer.apk"

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "Research timer.apk"

    # Only publishes to GitHub Releases when a version tag (e.g., v1.0.0) is pushed
    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: "Research timer.apk"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
