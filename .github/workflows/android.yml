name: Android CI/CD

on:
  push:
    branches: [ "main", "master", "developer" ]
  pull_request:
    branches: [ "main", "master", "developer" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  ACTIONS_AUDIT_NODE_VERSION: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Regenerate Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper

    - name: Create Mock Files (Keystore & Google Services)
      run: |
        # 1. Generate the expected debug keystore with default standard android credentials
        keytool -genkeypair -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US" \
          -storepass android \
          -keypass android

        # 2. Generate a dummy google-services.json to satisfy the Google Services plugin
        echo '{"project_info":{"project_number":"123","project_id":"mock-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.example"}},"api_key":[{"current_key":"mock_key"}],"services":{"app_invite_service":{"status":1}}}]}' > app/google-services.json

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
